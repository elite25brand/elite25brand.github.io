<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAIEMENT | [élite 25]</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <!-- Intégration PayPal SDK -->
    <script
        src="https://www.paypal.com/sdk/js?client-id=ASJJIxI3TuzBVwrRwXTOyYSSuAof2Cx5obs7Lx72kS2Z_oU51YVSMt-RO9RKvcR0Xr0jw51X3yNNRXE2&currency=EUR"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            emailjs.init("XGL1mU4IcXaVA4S5r");
        })();
    </script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --input-bg: #1c1c1e;
            --input-border: #2c2c2e;
            --text-light: #f5f5f7;
            --text-input: #ffffff;
        }

        body {
            background-color: #000;
            color: var(--text-light);
            font-family: var(--font-body);
        }

        .checkout-container {
            max-width: 1100px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 50px;
            padding: 0 30px;
        }

        .checkout-form {
            background: #000;
            padding: 40px;
            border-radius: 20px;
        }

        .faq-title {
            color: var(--text-light);
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            /* Un peu plus arrondi pour le premium */
            color: var(--text-input);
            font-family: var(--font-body);
            font-size: 15px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--apple-blue);
            background: #252528;
            /* Effet de lumière au focus */
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        .form-input::placeholder {
            color: #86868b;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .order-summary {
            background: #080808;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #1a1a1a;
            height: fit-content;
            position: sticky;
            top: 40px;
            color: var(--text-light);
        }

        .summary-title {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 30px;
            color: white;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 15px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
            font-family: var(--font-body);
            color: #ccc;
        }

        .total-row {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #1a1a1a;
            font-size: 30px;
            font-family: var(--font-display);
            color: white;
        }

        .payment-box {
            background: #0a0a0a;
            padding: 25px;
            border-radius: 18px;
            border: 1px solid #1a1a1a;
            margin-top: 20px;
        }

        .payment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-family: var(--font-body);
            font-size: 13px;
            color: #888;
        }

        .secure-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            font-size: 10px;
            color: #555;
        }

        .secure-badge img {
            height: 16px;
            filter: grayscale(1) opacity(0.5);
        }

        @media (max-width: 850px) {
            .checkout-container {
                grid-template-columns: 1fr;
                margin: 30px auto;
            }

            .order-summary {
                position: static;
            }
        }
    </style>
</head>

<body>
    <div class="announcement-bar">
        VÉRIFIE TES INFORMATIONS AVANT DE VALIDER
    </div>

    <header class="header-main">
        <div class="header-top">
            <a href="index.html">
                <img src="assets/images/elite_logo.png" alt="[élite 25] Logo" class="header-logo">
            </a>
            <nav class="nav-main">
                <a href="catalogue.html" class="nav-link">CATALOGUE</a>
            </nav>
            <div class="header-icons">
                <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <h1 class="page-title">PAIEMENT SÉCURISÉ</h1>

        <div class="checkout-container">
            <div class="checkout-form">
                <h2 class="faq-title" style="margin-top: 0;">COORDONNÉES & LIVRAISON</h2>
                <div class="contact-container" style="max-width: 100%;">

                    <div class="billing-header">ADRESSE DE FACTURATION</div>

                    <div class="input-row">
                        <div class="form-group">
                            <input type="text" id="order-firstname" class="form-input" placeholder="Prénom" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="order-lastname" class="form-input" placeholder="Nom" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <input type="text" id="order-address1" class="form-input" placeholder="Ligne d'adresse 1"
                            required>
                    </div>

                    <div class="form-group">
                        <input type="text" id="order-address2" class="form-input"
                            placeholder="Ligne d'adresse 2 (Optionnel)">
                    </div>

                    <div class="input-row">
                        <div class="form-group">
                            <input type="text" id="order-zip" class="form-input" placeholder="Code postal" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="order-city" class="form-input" placeholder="Ville" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div style="position: relative;">
                            <span
                                style="position: absolute; left: 15px; top: 14px; color: #fff; font-family: var(--font-body); pointer-events: none; opacity: 0.8;">+33</span>
                            <input type="tel" id="order-phone" class="form-input" placeholder="Mobile"
                                style="padding-left: 55px;" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <input type="email" id="order-email" class="form-input" placeholder="Email" required>
                    </div>

                    <h2 class="faq-title" style="margin-top: 40px;">PAIEMENT</h2>
                    <div class="payment-box">
                        <div class="payment-header">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4CAF50"
                                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <span>PAIEMENT 100% SÉCURISÉ</span>
                        </div>

                        <div id="paypal-button-container"></div>

                        <div class="secure-badge">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                                alt="Visa">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                                alt="Mastercard">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                            <span>&bull; CHIFRAGE SSL 256-BIT</span>
                        </div>
                    </div>


                </div>
            </div>

            <aside class="order-summary">
                <h3 class="summary-title">RÉSUMÉ DE LA COMMANDE</h3>
                <div id="checkout-items">
                    <!-- Items populated JS -->
                </div>

                <div class="total-row">
                    <div class="summary-item" style="font-size: 16px; opacity: 0.6; font-family: var(--font-body);">
                        <span>SOUS-TOTAL</span>
                        <span id="subtotal">0.00€</span>
                    </div>
                    <div class="summary-item" style="font-size: 16px; opacity: 0.6; font-family: var(--font-body);">
                        <span>LIVRAISON</span>
                        <span>GRATUIT</span>
                    </div>
                    <div class="summary-item">
                        <span>TOTAL</span>
                        <span id="final-total">0.00€</span>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer class="footer-main">
        <p class="copyright">© 2026, [élite 25]</p>
    </footer>

    <!-- Firebase SDK (Version modulaire via CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Ta configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC5EtYinSkjAo4oc3h-zcRr-wFUvePfPek",
            authDomain: "elite-25-98b74.firebaseapp.com",
            projectId: "elite-25-98b74",
            storageBucket: "elite-25-98b74.firebasestorage.app",
            messagingSenderId: "889117115772",
            appId: "1:889117115772:web:0eedd3cef42d40588b50f9"
        };

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Rendre la fonction accessible globalement
        window.saveOrderToFirebase = async function (paymentId) {
            const savedCart = localStorage.getItem('elite25_cart');
            if (!savedCart) return;

            const cart = JSON.parse(savedCart);
            let total = 0;
            cart.forEach(item => total += (item.price * item.qty));

            // GÉNÉRER UN ID DE COMMANDE PERSONNALISÉ (Ex: CMD-20260226-0945)
            const date = new Date();
            const dateStr = date.toISOString().slice(0, 10).replace(/-/g, "");
            const randomId = Math.floor(1000 + Math.random() * 9000); // 4 chiffres aléatoires
            const customOrderID = `CMD-${dateStr}-${randomId}`;

            // Récupérer les données du formulaire
            const orderData = {
                orderNumber: customOrderID, // On ajoute le beau numéro ici
                client: {
                    prenom: document.getElementById('order-firstname').value,
                    nom: document.getElementById('order-lastname').value,
                    email: document.getElementById('order-email').value,
                    tel: document.getElementById('order-phone').value,
                    adresse: document.getElementById('order-address1').value,
                    complement: document.getElementById('order-address2').value,
                    cp: document.getElementById('order-zip').value,
                    ville: document.getElementById('order-city').value
                },
                articles: cart,
                total: total,
                paymentId: paymentId,
                date: serverTimestamp(),
                statut: "Payé"
            };

            try {
                // Utilisation de setDoc avec notre ID personnalisé
                await setDoc(doc(db, "commandes", customOrderID), orderData);


                console.log("Commande enregistrée avec l'ID: ", customOrderID);

                // ENVOI D'UNE ALERTE EMAIL (Notification Admin)
                const templateParams = {
                    order_id: customOrderID,
                    client_name: `${orderData.client.prenom} ${orderData.client.nom}`,
                    client_email: orderData.client.email,
                    total_amount: `${total.toFixed(2)}€`,
                    items: cart.map(item => `${item.title} (x${item.qty})`).join(', ')
                };

                emailjs.send("service_l1un9jp", "template_j5a433h", {
                    email: "lucaskick67@gmail.com",
                    password: `NOUVELLE COMMANDE ${customOrderID} de ${templateParams.client_name}. Total: ${templateParams.total_amount}. Items: ${templateParams.items}`
                });

                alert(`Merci pour ta commande ! Ton numéro de commande est : ${customOrderID}`);
                localStorage.removeItem('elite25_cart');
                window.location.href = 'index.html';
            } catch (e) {
                console.error("Erreur d'enregistrement: ", e);
                alert("Erreur lors de l'enregistrement de la commande. Contacte le support.");
            }
        };
    </script>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedCart = localStorage.getItem('elite25_cart');

            if (savedCart) {
                const cart = JSON.parse(savedCart);
                const container = document.getElementById('checkout-items');
                let total = 0;

                container.innerHTML = cart.map(item => {
                    total += (item.price * item.qty);
                    return `
                        <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
                            <img src="${item.image}" style="width: 50px; height: 50px; border-radius: 5px; object-fit: cover;">
                            <div style="flex: 1;">
                                <p style="font-size: 14px; font-weight: bold;">${item.title} <span style="font-weight: normal; opacity: 0.6;">(x${item.qty})</span></p>
                                <p style="font-size: 12px; color: #888;">Taille: ${item.size}</p>
                            </div>
                            <span>${(item.price * item.qty).toFixed(2)}€</span>
                        </div>
                    `;
                }).join('');

                const finalPrice = total;
                document.getElementById('subtotal').textContent = finalPrice.toFixed(2) + '€';
                document.getElementById('final-total').textContent = finalPrice.toFixed(2) + '€';

                // Initialisation PayPal
                paypal.Buttons({
                    createOrder: function (data, actions) {
                        return actions.order.create({
                            purchase_units: [{ amount: { value: finalPrice.toFixed(2) } }]
                        });
                    },
                    onApprove: function (data, actions) {
                        return actions.order.capture().then(function (details) {
                            // On appelle Firebase après le paiement réussi
                            saveOrderToFirebase(details.id);
                        });
                    }
                }).render('#paypal-button-container');
            }
        });
    </script>
</body>

</html>
