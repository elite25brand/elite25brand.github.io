    <style>
        :root {
            --apple-blue: #0071e3;
            --input-bg: #1c1c1e;
            --input-border: #2c2c2e;
            --text-light: #f5f5f7;
            --text-input: #ffffff;
        }

        body {
            background-color: #000;
            color: var(--text-light);
            font-family: var(--font-body);
        }

        .checkout-container {
            max-width: 1100px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 50px;
            padding: 0 30px;
        }

        .checkout-form {
            background: #000;
            padding: 40px;
            border-radius: 20px;
        }

        .faq-title {
            color: var(--text-light);
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            /* Un peu plus arrondi pour le premium */
            color: var(--text-input);
            font-family: var(--font-body);
            font-size: 15px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--apple-blue);
            background: #252528;
            /* Effet de lumière au focus */
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        .form-input::placeholder {
            color: #86868b;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .order-summary {
            background: #080808;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #1a1a1a;
            height: fit-content;
            position: sticky;
            top: 40px;
            color: var(--text-light);
        }

        .summary-title {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 30px;
            color: white;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 15px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
            font-family: var(--font-body);
            color: #ccc;
        }

        .total-row {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #1a1a1a;
            font-size: 30px;
            font-family: var(--font-display);
            color: white;
        }

        .payment-box {
            background: #0a0a0a;
            padding: 25px;
            border-radius: 18px;
            border: 1px solid #1a1a1a;
            margin-top: 20px;
        }

        .payment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-family: var(--font-body);
            font-size: 13px;
            color: #888;
        }

        .secure-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            font-size: 10px;
            color: #555;
        }

        .secure-badge img {
            height: 16px;
            filter: grayscale(1) opacity(0.5);
        }

        @media (max-width: 850px) {
            .checkout-container {
                grid-template-columns: 1fr;
                margin: 30px auto;
            }

            .order-summary {
                position: static;
            }
        }
    </style>
</head>

    <!-- Firebase SDK (Version modulaire via CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Ta configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC5EtYinSkjAo4oc3h-zcRr-wFUvePfPek",
            authDomain: "elite-25-98b74.firebaseapp.com",
            projectId: "elite-25-98b74",
            storageBucket: "elite-25-98b74.firebasestorage.app",
            messagingSenderId: "889117115772",
            appId: "1:889117115772:web:0eedd3cef42d40588b50f9"
        };

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Exposer db pour le script principal
        window.db = db;
        window.getDoc = getDoc;
        window.doc = doc;

        // Rendre la fonction accessible globalement
        window.saveOrderToFirebase = async function (paymentId) {
            const savedCart = localStorage.getItem('elite25_cart');
            if (!savedCart) return;

            const cart = JSON.parse(savedCart);
            let subtotal = 0;
            cart.forEach(item => subtotal += (item.price * item.qty));
            const shipping = window.currentShippingFee || 0;
            const discount = window.isFirstOrder ? 5 : 0;
            const total = subtotal + shipping - discount;

            // GÉNÉRER UN ID DE COMMANDE PERSONNALISÉ (Ex: CMD-20260226-0945)
            const date = new Date();
            const dateStr = date.toISOString().slice(0, 10).replace(/-/g, "");
            const randomId = Math.floor(1000 + Math.random() * 9000); // 4 chiffres aléatoires
            const customOrderID = `CMD-${dateStr}-${randomId}`;

            // Récupérer les données du formulaire
            const orderData = {
                orderNumber: customOrderID, // On ajoute le beau numéro ici
                client: {
                    prenom: document.getElementById('order-firstname').value,
                    nom: document.getElementById('order-lastname').value,
                    email: document.getElementById('order-email').value,
                    tel: document.getElementById('order-phone').value,
                    adresse: document.getElementById('order-address1').value,
                    complement: document.getElementById('order-address2').value,
                    cp: document.getElementById('order-zip').value,
                    ville: document.getElementById('order-city').value
                },
                articles: cart,
                subtotal: subtotal,
                fraisLivraison: shipping,
                reduction: discount,
                total: total,
                paymentId: paymentId,
                date: serverTimestamp(),
                statut: "Payé"
            };

            try {
                // Utilisation de setDoc avec notre ID personnalisé
                await setDoc(doc(db, "commandes", customOrderID), orderData);


                console.log("Commande enregistrée avec l'ID: ", customOrderID);

                // ENVOI D'UNE ALERTE EMAIL (Notification Admin)
                const templateParams = {
                    order_id: customOrderID,
                    client_name: `${orderData.client.prenom} ${orderData.client.nom}`,
                    client_email: orderData.client.email,
                    total_amount: `${total.toFixed(2)}€`,
                    items: cart.map(item => `${item.title} (x${item.qty})`).join(', ')
                };

                emailjs.send("service_l1un9jp", "template_j5a433h", {
                    email: "lucaskick67@gmail.com",
                    password: `NOUVELLE COMMANDE ${customOrderID} de ${templateParams.client_name}. Total: ${templateParams.total_amount} (dont ${shipping.toFixed(2)}€ de livraison). Items: ${templateParams.items}`
                });

                // MISE À JOUR DU STATUT UTILISATEUR (Plus de réduction pour la prochaine fois)
                const savedUser = localStorage.getItem('elite25_user');
                if (savedUser) {
                    const user = JSON.parse(savedUser);
                    const userRef = doc(db, "utilisateurs", user.email);
                    await updateDoc(userRef, {
                        isFirstOrder: false
                    });
                    // Mettre à jour aussi le localStorage
                    user.isFirstOrder = false;
                    localStorage.setItem('elite25_user', JSON.stringify(user));
                }

                alert(`Merci pour ta commande ! Ton numéro de commande est : ${customOrderID}`);
                localStorage.removeItem('elite25_cart');
                window.location.href = 'index.html';
            } catch (e) {
                console.error("Erreur d'enregistrement: ", e);
                alert("Erreur lors de l'enregistrement de la commande. Contacte le support.");
            }
        };
    </script>

    <script src="js/main.js"></script>
    <script>
        let subtotal = 0;
        let shippingPrice = 0;
        let finalPrice = 0;
        let paypalButton = null;
        window.isFirstOrder = false;

        const SHOP_COORDS = { lat: 48.770287, lon: 7.409395 };

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Rayon de la terre en km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getFeeFromDistance(dist) {
            if (dist < 15) return 0; // Zone locale : Gratuit
            if (dist < 150) return 2.90;
            if (dist < 400) return 4.90;
            return 6.90; // National max
        }

        async function updateShipping() {
            const address = document.getElementById('order-address1').value;
            const zip = document.getElementById('order-zip').value;
            const city = document.getElementById('order-city').value;

            if (!zip || !city) return;

            const shippingDisplay = document.getElementById('shipping-fee');
            shippingDisplay.textContent = "Calcul...";

            try {
                const query = `${address} ${zip} ${city} France`;
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const destLat = parseFloat(data[0].lat);
                    const destLon = parseFloat(data[0].lon);
                    const distance = calculateDistance(SHOP_COORDS.lat, SHOP_COORDS.lon, destLat, destLon);

                    shippingPrice = getFeeFromDistance(distance);
                    shippingDisplay.textContent = shippingPrice === 0 ? "GRATUIT" : shippingPrice.toFixed(2) + "€";
                } else {
                    shippingPrice = 4.90;
                    shippingDisplay.textContent = "4.90€ (Standard)";
                }
            } catch (error) {
                console.error("Erreur géo :", error);
                shippingPrice = 4.90;
                shippingDisplay.textContent = "4.90€";
            }
            updateTotal();
        }

        function updateTotal() {
            const discount = window.isFirstOrder ? 5 : 0;
            finalPrice = subtotal + shippingPrice - discount;
            document.getElementById('final-total').textContent = finalPrice.toFixed(2) + '€';

            const discountRow = document.getElementById('discount-row');
            if (window.isFirstOrder) {
                discountRow.style.display = 'flex';
            } else {
                discountRow.style.display = 'none';
            }

            // On stocke le shipping pour Firebase
            window.currentShippingFee = shippingPrice;
            window.currentTotal = finalPrice;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const savedCart = localStorage.getItem('elite25_cart');
            const savedUser = localStorage.getItem('elite25_user');

            if (savedUser) {
                const user = JSON.parse(savedUser);
                // Vérifier en temps réel dans Firestore pour éviter les fraudes
                try {
                    // On attend un peu que Firebase soit prêt si besoin
                    const checkFirstOrder = async () => {
                        if (!window.db) {
                            setTimeout(checkFirstOrder, 100);
                            return;
                        }
                        const userRef = window.doc(window.db, "utilisateurs", user.email);
                        const userSnap = await window.getDoc(userRef);
                        if (userSnap.exists()) {
                            window.isFirstOrder = userSnap.data().isFirstOrder;
                            updateTotal();
                        }
                    };
                    checkFirstOrder();
                } catch (e) {
                    console.error("Erreur réduction:", e);
                }
            }

            if (savedCart) {
                const cart = JSON.parse(savedCart);
                const container = document.getElementById('checkout-items');
                subtotal = 0;

                container.innerHTML = cart.map(item => {
                    subtotal += (item.price * item.qty);
                    return `
                        <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
                            <img src="${item.image}" style="width: 50px; height: 50px; border-radius: 5px; object-fit: cover;">
                            <div style="flex: 1;">
                                <p style="font-size: 14px; font-weight: bold;">${item.title} <span style="font-weight: normal; opacity: 0.6;">(x${item.qty})</span></p>
                                <p style="font-size: 12px; color: #888;">Taille: ${item.size}</p>
                            </div>
                            <span>${(item.price * item.qty).toFixed(2)}€</span>
                        </div>
                    `;
                }).join('');

                document.getElementById('subtotal').textContent = subtotal.toFixed(2) + '€';
                updateTotal();

                // Listeners pour déclencher le calcul
                ['order-address1', 'order-zip', 'order-city'].forEach(id => {
                    document.getElementById(id).addEventListener('blur', updateShipping);
                });

                // Initialisation PayPal
                paypal.Buttons({
                    createOrder: function (data, actions) {
                        const discount = window.isFirstOrder ? 5 : 0;
                        return actions.order.create({
                            purchase_units: [{
                                amount: {
                                    value: finalPrice.toFixed(2),
                                    breakdown: {
                                        item_total: { currency_code: 'EUR', value: subtotal.toFixed(2) },
                                        shipping: { currency_code: 'EUR', value: shippingPrice.toFixed(2) },
                                        discount: { currency_code: 'EUR', value: discount.toFixed(2) }
                                    }
                                }
                            }]
                        });
                    },
                    onApprove: function (data, actions) {
                        return actions.order.capture().then(function (details) {
                            saveOrderToFirebase(details.id);
                        });
                    }
                }).render('#paypal-button-container');
            }
        });
    </script>
