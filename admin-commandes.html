<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | Commandes [élite 25]</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .admin-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #1a1a1a;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0071e3;
        }

        .order-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 18px;
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .order-card:hover {
            border-color: #333;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
        }

        .order-id {
            color: #888;
            font-size: 12px;
        }

        .order-date {
            font-size: 14px;
            color: #0071e3;
        }

        .client-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .items-list {
            margin-top: 15px;
            padding-left: 0;
            list-style: none;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .badge-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-paid {
            background: #1a3a1e;
            color: #4caf50;
        }

        .status-demo {
            background: #3a2a1a;
            color: #ff9800;
        }

        .loader {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            color: #888;
        }
    </style>
</head>

<body>
    <div id="login-section" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="stat-card" style="width: 100%; max-width: 400px; padding: 40px;">
            <h2 style="margin-bottom: 30px; font-family: var(--font-display);">ACCÈS ÉLITE ADMIN</h2>
            <div class="form-group" style="margin-bottom: 15px; text-align: left;">
                <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">EMAIL</label>
                <input type="email" id="admin-email" class="form-input" placeholder="lucas@example.com"
                    style="width: 100%; border-radius: 8px;">
            </div>
            <div class="form-group" style="margin-bottom: 30px; text-align: left;">
                <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">MOT DE PASSE</label>
                <input type="password" id="admin-password" class="form-input" placeholder="••••••••"
                    style="width: 100%; border-radius: 8px;">
            </div>
            <button onclick="loginAdmin()" class="btn-pill btn-primary" style="width: 100%; padding: 15px;">SE
                CONNECTER</button>
            <p id="login-error" style="color: #ff453a; font-size: 12px; margin-top: 20px; display: none;"></p>
        </div>
    </div>

    <div id="admin-content" style="display: none;" class="admin-container">
        <header class="admin-header">
            <h1 class="page-title" style="margin: 0; font-size: 32px;">GESTION DES COMMANDES</h1>
            <div style="text-align: right;">
                <div id="order-count" class="stat-value">0 Commande</div>
                <button onclick="logoutAdmin()"
                    style="background: none; border: none; color: #888; cursor: pointer; font-size: 12px; text-decoration: underline;">Déconnexion</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div>Chiffre d'Affaires</div>
                <div id="total-revenue" class="stat-value">0.00€</div>
            </div>
            <div class="stat-card">
                <div>Dernière Commande</div>
                <div id="last-order-date" class="stat-value">-</div>
            </div>
        </div>

        <div id="orders-list">
            <div class="loader">Chargement des commandes...</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5EtYinSkjAo4oc3h-zcRr-wFUvePfPek",
            authDomain: "elite-25-98b74.firebaseapp.com",
            projectId: "elite-25-98b74",
            storageBucket: "elite-25-98b74.firebasestorage.app",
            messagingSenderId: "889117115772",
            appId: "1:889117115772:web:0eedd3cef42d40588b50f9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Fonctions globales
        window.loginAdmin = async function () {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('login-error');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorEl.textContent = "Accès refusé ou erreur d'identifiants.";
                errorEl.style.display = "block";
            }
        };

        window.logoutAdmin = () => signOut(auth);

        // Surveillance de la connexion
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "lucaskick67@gmail.com") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                startOrdersListener();
            } else if (user) {
                // Si connecté avec le mauvais email
                const errorEl = document.getElementById('login-error');
                errorEl.textContent = "Accès non autorisé pour ce compte.";
                errorEl.style.display = "block";
                signOut(auth);
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        // Chargement des données
        function startOrdersListener() {
            const q = query(collection(db, "commandes"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById('orders-list');
                listContainer.innerHTML = '';
                let totalRevenue = 0;

                snapshot.forEach((doc) => {
                    const order = doc.data();
                    const date = order.date ? order.date.toDate().toLocaleString('fr-FR') : 'Date inconnue';
                    totalRevenue += order.total || 0;

                    const orderHtml = `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <span class="order-date">${date}</span>
                                    <div class="order-id">ID: ${doc.id}</div>
                                </div>
                                <div style="text-align: right;">
                                    <span class="badge-status ${order.paymentId === 'DEMO_PAYMENT' ? 'status-demo' : 'status-paid'}">
                                        ${order.paymentId === 'DEMO_PAYMENT' ? 'TEST' : 'PAYÉ'}
                                    </span>
                                    <div style="font-size: 20px; font-weight: bold; margin-top: 5px;">${order.total.toFixed(2)}€</div>
                                </div>
                            </div>
                            <div class="client-info">
                                <div>
                                    <strong style="color: #0071e3; font-size: 12px;">CLIENT</strong><br>
                                    ${order.client.prenom} ${order.client.nom}<br>
                                    ${order.client.email}<br>
                                    ${order.client.tel}
                                </div>
                                <div>
                                    <strong style="color: #0071e3; font-size: 12px;">LIVRAISON</strong><br>
                                    ${order.client.adresse}<br>
                                    ${order.client.cp} ${order.client.ville}
                                </div>
                            </div>
                            <div class="items-list" style="margin-top: 20px;">
                                ${order.articles.map(item => `
                                    <div class="item-row">
                                        <span>${item.qty}x ${item.title} (Taille: ${item.size})</span>
                                        <span>${(item.price * item.qty).toFixed(2)}€</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                    listContainer.innerHTML += orderHtml;
                });

                document.getElementById('order-count').textContent = snapshot.size + " Commande" + (snapshot.size > 1 ? "s" : "");
                document.getElementById('total-revenue').textContent = totalRevenue.toFixed(2) + "€";
                if (snapshot.docs[0]) {
                    const lastDate = snapshot.docs[0].data().date;
                    document.getElementById('last-order-date').textContent = lastDate ? lastDate.toDate().toLocaleDateString() : '-';
                }
            });
        }
    </script>
</body>
</script>
</body>

</html>
